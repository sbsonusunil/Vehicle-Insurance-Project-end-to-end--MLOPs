<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .result-box {
            font-size: 1.3rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h2 class="text-center mb-4">Vehicle Insurance Interest Predictor</h2>

                    {% if result %}
                    <div class="alert alert-info result-box text-center mb-4" role="alert">
                        Prediction: {{ result }}
                    </div>
                    {% endif %}

                    <form action="/predict" method="POST">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="Gender" class="form-label">Gender</label>
                                <select class="form-select" id="Gender" name="Gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="Age" class="form-label">Age</label>
                                <input type="number" class="form-control" id="Age" name="Age" min="18" max="100" required>
                            </div>

                            <div class="col-md-6">
                                <label for="Driving_License" class="form-label">Driving License</label>
                                <select class="form-select" id="Driving_License" name="Driving_License" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="Region_Code" class="form-label">Region Code</label>
                                <input type="number" class="form-control" id="Region_Code" name="Region_Code" step="0.1" required>
                            </div>

                            <div class="col-md-6">
                                <label for="Previously_Insured" class="form-label">Previously Insured</label>
                                <select class="form-select" id="Previously_Insured" name="Previously_Insured" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="Vehicle_Age" class="form-label">Vehicle Age</label>
                                <select class="form-select" id="Vehicle_Age" name="Vehicle_Age" required>
                                    <option value="">Select Vehicle Age</option>
                                    <option value="< 1 Year">&lt; 1 Year</option>
                                    <option value="1-2 Year">1-2 Year</option>
                                    <option value="> 2 Years">&gt; 2 Years</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="Vehicle_Damage" class="form-label">Vehicle Damage</label>
                                <select class="form-select" id="Vehicle_Damage" name="Vehicle_Damage" required>
                                    <option value="">Select</option>
                                    <option value="Yes">Yes</option>
                                    <option value="No">No</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="Annual_Premium" class="form-label">Annual Premium</label>
                                <input type="number" class="form-control" id="Annual_Premium" name="Annual_Premium" step="0.01" required>
                            </div>

                            <div class="col-md-6">
                                <label for="Policy_Sales_Channel" class="form-label">Policy Sales Channel</label>
                                <input type="number" class="form-control" id="Policy_Sales_Channel" name="Policy_Sales_Channel" step="0.1" required>
                            </div>

                            <div class="col-md-6">
                                <label for="Vintage" class="form-label">Vintage (days)</label>
                                <input type="number" class="form-control" id="Vintage" name="Vintage" min="1" required>
                            </div>

                            <div class="col-12 text-center mt-3">
                                <button type="submit" class="btn btn-primary btn-lg px-5">Predict</button>
                            </div>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/train" class="btn btn-outline-secondary">Trigger Training Pipeline</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
